<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Legal Assistant — AI Document Search</title>
    <meta name="description" content="AI-powered Legal Assistant for semantic search across legal documents, contracts, and court transcripts."/>
    <meta name="csrf-token" content="{{ csrf_token }}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="/static/style.css"/>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="/static/app.js" defer></script>
</head>
<body class="{% if not is_light_theme %}dark-theme{% endif %}" hx-headers='{"x-csrf-token": "{{ csrf_token }}"}'>

    <button onclick="toggleTheme()" class="theme-toggle-btn" id="theme-toggle-button" title="Toggle Theme" aria-label="Toggle Theme">
        <i class="fa-solid {% if is_light_theme %}fa-moon{% else %}fa-sun{% endif %}" id="theme-icon"></i>
    </button>

    <div id="app-root">
    {% if not is_authenticated %}
        {% include 'auth.html' %}
    {% else %}
        {% include 'dashboard.html' %}
    {% endif %}
    </div>

</body>
</html>
